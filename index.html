<style>
:root{--bg:#07090d;--border:#1e2a38;--border-hi:#2a3d52;--green:#39ff9a;--green-dim:#1a7a4a;--cyan:#00d4ff;--amber:#ffaa00;--text:#b0c8b8;--text-dim:#5a7a65;--text-hi:#ddeedd;--font-mono:'DM Mono',monospace;--font-serif:'Playfair Display',serif;--font-body:'Crimson Pro',serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background-color:var(--bg);background-image:linear-gradient(rgba(57,255,154,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,154,.03) 1px,transparent 1px);background-size:40px 40px;color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
nav{position:fixed;top:0;left:0;right:0;background:rgba(7,9,13,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:48px;}
.nav-brand{font-family:var(--font-mono);font-size:.72rem;color:var(--green);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;}
.nav-links{display:flex;gap:1.75rem;list-style:none;}
.nav-links a{font-family:var(--font-mono);font-size:.68rem;color:var(--text-dim);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;}
.nav-links a:hover{color:var(--text-hi);}
.nav-links a.ext{color:#2a3d52;}.nav-links a.ext:hover{color:var(--text-dim);}
.splash{text-align:center;padding:2rem;}
.splash-label{font-family:var(--font-mono);font-size:.62rem;color:var(--cyan);letter-spacing:.22em;text-transform:uppercase;margin-bottom:1rem;}
.splash-title{font-family:var(--font-serif);font-size:clamp(2.2rem,6vw,3.5rem);color:var(--text-hi);line-height:1.1;margin-bottom:1rem;}
.splash-title .cursor{color:var(--green);animation:cur 1s step-end infinite;}
@keyframes cur{0%,100%{opacity:1;}50%{opacity:0;}}
.splash-sub{font-family:var(--font-body);font-size:1rem;color:var(--text-dim);font-style:italic;margin-bottom:2rem;}
.badge{display:inline-flex;align-items:center;gap:.6rem;font-family:var(--font-mono);font-size:.62rem;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border);padding:.45rem 1rem;margin-bottom:2rem;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.btn{display:inline-block;font-family:var(--font-mono);font-size:.7rem;color:var(--green);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--green-dim);padding:.65rem 1.75rem;transition:background .2s,color .2s;margin-right:.75rem;}
.btn:hover{background:var(--green);color:var(--bg);}
.btn.sec{color:var(--text-dim);border-color:var(--border);}
.btn.sec:hover{background:#0c1018;color:var(--text-hi);}
footer{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--border);padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:.58rem;color:var(--text-dim);background:var(--bg);}
footer a{color:var(--text-dim);text-decoration:none;}footer a:hover{color:var(--green);}
</style>
</head>
